<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手势粒子控制</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  canvas { display: block; }
  #video { display: none; }
  #status {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.8); font-size: 13px;
    z-index: 10; pointer-events: none;
    background: rgba(0,0,0,0.6); padding: 6px 16px;
    border-radius: 16px; backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    transition: opacity 0.3s;
  }
  #info {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.4); font-size: 12px;
    text-align: center; z-index: 10; pointer-events: none;
    background: rgba(0,0,0,0.5); padding: 8px 20px;
    border-radius: 16px; backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    white-space: nowrap;
  }
  #info span { display: inline-block; margin: 0 12px; }
  #info em { font-style: normal; color: rgba(255,255,255,0.6); }
  #camera-preview {
    position: fixed; bottom: 24px; right: 24px;
    width: 160px; height: 120px;
    border-radius: 12px; overflow: hidden;
    z-index: 10;
    border: 1px solid rgba(255,255,255,0.15);
    opacity: 0.4; transition: opacity 0.3s;
    pointer-events: none;
  }
  #camera-preview:hover { opacity: 0.8; }
  #camera-preview video {
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }
  .loading-dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<video id="video" autoplay playsinline></video>
<div id="camera-preview"><video id="preview-video" autoplay playsinline muted></video></div>
<div id="status">正在加载手势识别...</div>
<div id="info">
  <span><em>食指位置</em> - 移动粒子</span>
  <span><em>捏合</em> - 缩放</span>
  <span><em>旋转手腕</em> - 旋转</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
(function() {
  'use strict';

  // ---- Setup Canvas ----
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ---- Particle System ----
  const PARTICLE_COUNT = 350;
  const CONNECT_DIST = 100;

  let particles = [];

  class Particle {
    constructor() {
      const angle = Math.random() * Math.PI * 2;
      const radius = Math.pow(Math.random(), 0.4) * 100;
      this.homeX = Math.cos(angle) * radius;
      this.homeY = Math.sin(angle) * radius;

      this.x = this.homeX;
      this.y = this.homeY;
      this.vx = 0;
      this.vy = 0;

      this.size = Math.random() * 2.5 + 1;
      this.baseSize = this.size;
      this.hue = (angle * 180 / Math.PI + 280) % 360;
      this.sat = 70 + Math.random() * 30;
      this.light = 55 + Math.random() * 25;
      this.phase = Math.random() * Math.PI * 2;
      this.pulseSpeed = 0.5 + Math.random() * 1.5;
    }

    update(delta) {
      const ATTRACTION = 0.03;
      const DAMPING = 0.92;
      const MAX_V = 10;

      const targetX = this.homeX * smoothScale * Math.cos(smoothRot)
                    - this.homeY * smoothScale * Math.sin(smoothRot)
                    + smoothX - W / 2;
      const targetY = this.homeX * smoothScale * Math.sin(smoothRot)
                    + this.homeY * smoothScale * Math.cos(smoothRot)
                    + smoothY - H / 2;

      const dx = targetX - this.x;
      const dy = targetY - this.y;

      this.vx += dx * ATTRACTION;
      this.vy += dy * ATTRACTION;

      // squirl / orbital perturbation
      this.vx += (Math.random() - 0.5) * 0.3;
      this.vy += (Math.random() - 0.5) * 0.3;

      this.vx *= DAMPING;
      this.vy *= DAMPING;

      const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
      if (speed > MAX_V) {
        this.vx = (this.vx / speed) * MAX_V;
        this.vy = (this.vy / speed) * MAX_V;
      }

      this.x += this.vx * delta;
      this.y += this.vy * delta;

      this.size = this.baseSize + Math.sin(this.phase) * 0.4;
      this.phase += this.pulseSpeed * 0.02;
    }

    draw() {
      const px = this.x;
      const py = this.y;

      if (px < -50 || px > W + 50 || py < -50 || py > H + 50) return;

      const distToCenter = Math.sqrt(
        (px - smoothX) * (px - smoothX) + (py - smoothY) * (py - smoothY)
      );
      const glowIntensity = Math.max(0, 1 - distToCenter / (Math.min(W, H) * 0.6));
      const alpha = 0.5 + glowIntensity * 0.5;

      ctx.beginPath();
      ctx.arc(px, py, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue}, ${this.sat}%, ${this.light}%, ${alpha})`;

      ctx.shadowColor = `hsla(${this.hue}, 100%, 70%, ${alpha * 0.4})`;
      ctx.shadowBlur = this.size * 4;
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  function initParticles() {
    particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(new Particle());
    }
  }
  initParticles();

  // ---- Gesture State (smoothed) ----
  let smoothX = W / 2;
  let smoothY = H / 2;
  let smoothScale = 1;
  let smoothRot = 0;

  // Raw gesture targets
  let targetX = W / 2;
  let targetY = H / 2;
  let targetScale = 1;
  let targetRot = 0;
  let handDetected = false;
  let noHandTimer = 0;

  // ---- MediaPipe Hands ----
  const statusEl = document.getElementById('status');

  function onResults(results) {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
      const lm = results.multiHandLandmarks[0];

      // Position from index finger tip (8) - mirror X
      targetX = (1 - lm[8].x) * W;
      targetY = lm[8].y * H;
      handDetected = true;
      noHandTimer = 0;

      // Pinch: distance between thumb tip (4) and index tip (8)
      const dx = lm[4].x - lm[8].x;
      const dy = lm[4].y - lm[8].y;
      const dz = (lm[4].z || 0) - (lm[8].z || 0);
      const pinchDist = Math.sqrt(dx * dx + dy * dy + dz * dz);
      targetScale = Math.max(0.3, Math.min(2.5, pinchDist * 6));

      // Rotation: angle from wrist (0) to middle finger MCP (9)
      const angle = Math.atan2(lm[9].y - lm[0].y, lm[9].x - lm[0].x);
      targetRot = angle;

      statusEl.textContent = '手部已识别';
      statusEl.style.borderColor = 'rgba(100, 255, 100, 0.3)';
    } else {
      handDetected = false;
      statusEl.textContent = '未检测到手部';
      statusEl.style.borderColor = 'rgba(255,255,255,0.1)';
    }
  }

  // Load MediaPipe Hands
  let handsLoaded = false;
  try {
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.5
    });

    hands.onResults(onResults);

    const video = document.getElementById('video');
    const preview = document.getElementById('preview-video');

    const camera = new Camera(video, {
      onFrame: async () => {
        try {
          await hands.send({ image: video });
        } catch (e) {
          // silent
        }
      },
      width: 640,
      height: 480
    });

    camera.start().then(() => {
      // Mirror the video stream to the preview
      if (preview.srcObject !== video.srcObject) {
        preview.srcObject = video.srcObject;
      }
      handsLoaded = true;
      statusEl.textContent = '摄像头已启动，请伸出手';
    }).catch((err) => {
      statusEl.textContent = '摄像头启动失败: ' + err.message;
    });
  } catch (e) {
    statusEl.textContent = '手势识别加载失败: ' + e.message;
  }

  // ---- Background stars layer ----
  let stars = [];
  for (let i = 0; i < 100; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.3,
      a: Math.random() * 0.5 + 0.1,
      s: Math.random() * 0.02 + 0.005
    });
  }

  function drawBackground() {
    // Subtle radial gradient background
    const grad = ctx.createRadialGradient(smoothX, smoothY, 0, smoothX, smoothY, Math.max(W, H) * 0.8);
    const intensity = handDetected ? 0.15 : 0.05;
    grad.addColorStop(0, `rgba(30, 20, 60, ${intensity})`);
    grad.addColorStop(0.5, `rgba(10, 5, 30, ${intensity * 0.7})`);
    grad.addColorStop(1, 'rgba(0, 0, 0, 1)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Twinkling stars
    for (const star of stars) {
      star.a += star.s;
      const alpha = 0.3 + Math.sin(star.a) * 0.3;
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.fill();
    }
  }

  // ---- Connection Lines ----
  function drawConnections() {
    const len = particles.length;
    for (let i = 0; i < len; i++) {
      const a = particles[i];
      if (a.x < -50 || a.x > W + 50 || a.y < -50 || a.y > H + 50) continue;

      for (let j = i + 1; j < len; j++) {
        const b = particles[j];
        const dx = a.x - b.x;
        const dy = a.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < CONNECT_DIST) {
          const alpha = (1 - dist / CONNECT_DIST) * 0.2;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `hsla(${(a.hue + b.hue) / 2}, 60%, 70%, ${alpha})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
    }
  }

  // ---- Hand attractor visual ----
  function drawAttractor() {
    if (!handDetected) return;

    const grad = ctx.createRadialGradient(smoothX, smoothY, 0, smoothX, smoothY, 60);
    grad.addColorStop(0, 'rgba(180, 140, 255, 0.15)');
    grad.addColorStop(0.5, 'rgba(100, 80, 200, 0.05)');
    grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(smoothX, smoothY, 60, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(smoothX, smoothY, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200, 180, 255, 0.6)';
    ctx.fill();
  }

  // ---- Animation Loop ----
  let lastTime = 0;

  function animate(time) {
    const delta = Math.min((time - lastTime) / 16, 3);
    lastTime = time;

    // Smooth follow
    smoothX += (targetX - smoothX) * 0.08 * delta;
    smoothY += (targetY - smoothY) * 0.08 * delta;
    smoothScale += (targetScale - smoothScale) * 0.06 * delta;
    smoothRot += (targetRot - smoothRot) * 0.06 * delta;

    // Drift back when no hand
    if (!handDetected) {
      const cx = W / 2, cy = H / 2;
      smoothX += (cx - smoothX) * 0.01;
      smoothY += (cy - smoothY) * 0.01;
      smoothScale += (1 - smoothScale) * 0.01;
    }

    // Draw
    ctx.save();
    drawBackground(ctx);

    // Update & draw particles
    for (const p of particles) {
      p.update(delta);
      p.draw();
    }

    drawConnections();
    drawAttractor();
    ctx.restore();

    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

  // ---- Window resize ----
  window.addEventListener('resize', () => {
    resize();
    stars = [];
    for (let i = 0; i < 100; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.2 + 0.3,
        a: Math.random() * 0.5 + 0.1,
        s: Math.random() * 0.02 + 0.005
      });
    }
    initParticles();
  });

})();
</script>
</body>
</html>
